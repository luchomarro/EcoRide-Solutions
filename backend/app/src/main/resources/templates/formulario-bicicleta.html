<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EcoRide - Registrar Bicicleta</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card shadow-sm border-0">
                    <div class="card-header bg-dark text-white text-center py-3">
                        <h4 class="mb-0">🚲 EcoRide - Registro de Unidad</h4>
                    </div>
                    <div class="card-body p-4">
                        <form th:action="@{/bicicletas/guardar}" th:object="${bicicleta}" method="post">
                            
                            <div class="mb-3">
                                <label for="codigo" class="form-label fw-bold">Código Único</label>
                                <input type="text" id="codigo" th:field="*{codigo}" class="form-control" placeholder="Ej: ECO-102" required>
                            </div>

                            <div class="mb-3">
                                <label for="marca" class="form-label fw-bold">Marca</label>
                                <input type="text" id="marca" th:field="*{marca}" class="form-control" placeholder="Ej: Trek, Specialized" required>
                            </div>

                            <div class="mb-3">
                                <label for="modelo" class="form-label fw-bold">Modelo</label>
                                <input type="text" id="modelo" th:field="*{modelo}" class="form-control" placeholder="Ej: Marlin 5, FX 2" required>
                            </div>

                            <div class="mb-3">
                                <label for="tipo" class="form-label fw-bold">Tipo de Bicicleta</label>
                                <select id="tipo" th:field="*{tipo}" class="form-select" required>
                                    <option value="" disabled selected>Seleccione un tipo...</option>
                                    <option value="Urbana">Urbana</option>
                                    <option value="Montaña">Montaña</option>
                                    <option value="Eléctrica">Eléctrica</option>
                                </select>
                            </div>

                            <div class="mb-4">
                                <label for="estado" class="form-label fw-bold">Estado Inicial</label>
                                <select id="estado" th:field="*{estado}" class="form-select" required>
                                    <option value="Disponible">Disponible</option>
                                    <option value="Mantenimiento">En Mantenimiento</option>
                                    <option value="Alquilada">Alquilada</option>
                                </select>
                            </div>

                            <div class="d-grid">
                                <button type="submit" class="btn btn-success btn-lg">Registrar e Ingresar al Inventario</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
