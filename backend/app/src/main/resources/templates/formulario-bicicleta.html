<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EcoRide - Registrar Bicicleta</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow-sm border-0">
                <div class="card-header bg-dark text-white text-center py-3">
                    <h4 class="mb-0">🚲 EcoRide - Registro de Unidad</h4>
                </div>
                <div class="card-body p-4">
                    <form th:action="@{/bicicletas/guardar}" th:object="${bicicleta}" method="post">

                        <div class="mb-3">
                            <label for="nombre" class="form-label fw-bold">Nombre</label>
                            <input type="text" id="nombre" th:field="*{nombre}"
                                   class="form-control" placeholder="Ej: Eco City Express" required>
                        </div>

                        <div class="mb-3">
                            <label for="descripcion" class="form-label fw-bold">Descripción</label>
                            <textarea id="descripcion" th:field="*{descripcion}"
                                      class="form-control" rows="3"
                                      placeholder="Características principales..."></textarea>
                        </div>

                        <div class="mb-3">
                            <label for="precioHora" class="form-label fw-bold">Precio por hora (S/)</label>
                            <input type="number" id="precioHora" th:field="*{precioHora}"
                                   class="form-control" step="0.50" min="0.50"
                                   placeholder="Ej: 4.50" required>
                        </div>

                        <div class="mb-3">
                            <label for="urlImagen" class="form-label fw-bold">URL de imagen</label>
                            <input type="url" id="urlImagen" th:field="*{urlImagen}"
                                   class="form-control" placeholder="https://...">
                        </div>

                        <div class="mb-4">
                            <label for="estado" class="form-label fw-bold">Estado inicial</label>
                            <select id="estado" th:field="*{estado}" class="form-select" required>
                                <option th:each="e : ${estados}"
                                        th:value="${e}"
                                        th:text="${e}">
                                </option>
                            </select>
                        </div>

                        <div class="d-grid">
                            <button type="submit" class="btn btn-success btn-lg">
                                Registrar e Ingresar al Inventario
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
